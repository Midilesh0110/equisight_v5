name: EquiSight V5 Daily Run

on:
  schedule:
    # Runs at 18:00 IST (12:30 UTC) every weekday (Mon-Fri)
    - cron: '30 12 * * 1-5'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  run_model:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily orchestrator
        run: python main.py

      - name: Commit updated database and logs
        run: |
          git config user.name "EquiSight Bot"
          git config user.email "bot@equisight.local"
          git add database/equisight_v5.db logs/
          git diff --staged --quiet || git commit -m "🤖 Daily update $(date +'%Y-%m-%d')"
          git push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}