name: Equisight V5 Live Engine

on:
  schedule:
    # Runs at 12:30 UTC (6:00 PM IST) Monday to Friday
    - cron: '30 12 * * 1-5'
  workflow_dispatch:   # allows manual run from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for pushing commits

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance scikit-learn requests

      - name: Run V5 Live Engine
        run: python main.py

      - name: Commit Database & CSV Outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Daily update – DB and CSVs"
          file_pattern: 'database/equisight_v5.db *.csv'