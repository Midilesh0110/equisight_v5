name: EquiSight V5 Daily Run

on:
  schedule:
    - cron: '30 12 * * 1-5'      # 6:00 PM IST, Mon–Fri
  workflow_dispatch:

permissions:
  contents: write                # allow the job to push commits

jobs:
  run_model:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily orchestrator
        run: python main.py

      - name: Commit updated database and logs
        run: |
          git config user.name "EquiSight Bot"
          git config user.email "bot@equisight.local"
          git add database/equisight_v5.db logs/
          git diff --staged --quiet || git commit -m "🤖 Daily update $(date +'%Y-%m-%d')"
          git push